  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #1a0b2e;
    }

    ::-webkit-scrollbar-thumb {
      background: #5b21b6;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #7c3aed;
    }

    body {
      background-color: #1a0b2e;
      color: #ffffff;
      font-size: 19px;
    }

    .glass-effect {
      background: rgba(26, 11, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Marker Animation Styles */
    /* Marker Animation Styles */
    .marker {
      position: relative;
      display: inline;
      padding: 0.1em 0.15em;
      margin: 0 -0.15em;
      text-decoration: none;
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
      background-repeat: no-repeat;
      background-size: 0% 100%;
      background-position: 100% 0%;
      /* Default RTL, will be overridden by JS or specific rule */
      border-radius: 2px;
    }

    .marker.active {
      background-size: 100% 100%;
      transition: background-size 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .marker.reversing {
      background-position: 100% 0%;
      background-size: 0% 100%;
      transition: background-size 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Purple Marker */
    .marker--purple {
      background-image: linear-gradient(104deg,
          rgba(168, 85, 247, 0) 0.9%,
          rgba(168, 85, 247, 0.55) 2.4%,
          rgba(168, 85, 247, 0.4) 5.8%,
          rgba(168, 85, 247, 0.3) 93%,
          rgba(168, 85, 247, 0.45) 96%,
          rgba(168, 85, 247, 0) 98%),
        linear-gradient(183deg,
          rgba(168, 85, 247, 0) 0%,
          rgba(168, 85, 247, 0.2) 7.9%,
          rgba(168, 85, 247, 0.45) 15%,
          rgba(168, 85, 247, 0.4) 85%,
          rgba(168, 85, 247, 0.2) 92%,
          rgba(168, 85, 247, 0) 100%);
    }

    /* Initial position based on direction */




    /* Disable pseudo-elements from previous implementation */
    .marker::before {
      display: none;
    }
  </style>

  <!-- SVG Filter for realistic marker texture -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <defs>
      <filter id="marker-texture" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
